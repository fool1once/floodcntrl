<section class="page">
    <h2>Safety Precautions</h2>

    <div class="card">
        <h3>Before Flood</h3>
        <p>Prepare emergency kits, charge phones, monitor weather updates.</p>
    </div>

    <div class="card">
        <h3>During Flood</h3>
        <p>Move to higher ground, avoid walking in floodwaters.</p>
    </div>

    <div class="card">
        <h3>After Flood</h3>
        <p>Avoid contaminated water and check for structural damage.</p>
    </div>
